openapi: 3.0.3
info:
  title: URL Shortener API
  description: |
    Сервис для сокращения ссылок
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Локальный сервер разработки

paths:
  /:
    post:
      summary: Создать сокращенный токен
      description: |
        Принимает оригинальный URL, генерирует уникальный 10-значный токен и сохраняет его в выбранное хранилище. 
        Если URL новый — возвращает статус 201 Created. 
        Если URL уже был сокращен ранее — возвращает статус 200 OK с существующим токеном.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortenRequest'
      responses:
        '201':
          description: Токен успешно создан (новый URL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortenResponse'
        '200':
          description: URL уже был сокращен, возвращен существующий токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortenResponse'
        '400':
          description: Ошибка валидации запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                MalformedJSON:
                  summary: Синтаксическая ошибка в JSON
                  value:
                    error: "malformed JSON body or missing required fields"
                InvalidURL:
                  summary: Неверный формат URL-адреса
                  value:
                    error: "invalid url format, must be a valid absolute URI"
        '507':
          description: Хранилище переполнено (достигнут лимит capacity в In-Memory)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                StorageFull:
                  summary: Лимит емкости исчерпан
                  value:
                    error: "storage limit reached"
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InternalError:
                  summary: Ошибка сервера
                  value:
                    error: "internal server error"

  /{short}:
    get:
      summary: Перенаправление на оригинальный URL
      description: Принимает 10-символьный токен и выполняет HTTP 307 редирект на оригинальный длинный URL.
      parameters:
        - name: short
          in: path
          required: true
          description: Уникальный 10-символьный ключ (разрешены буквы, цифры и нижнее подчеркивание)
          schema:
            type: string
            minLength: 10
            maxLength: 10
            pattern: '^[a-zA-Z0-9_]{10}$'
          example: "X_9b2DfR4e"
      responses:
        '307':
          description: Временный редирект. Оригинальный URL передан в заголовке Location.
          headers:
            Location:
              description: Целевой адрес для перенаправления браузера
              schema:
                type: string
                format: uri
              example: "https://github.com/gin-gonic/gin"
        '400':
          description: Неверный формат токена в пути URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InvalidFormat:
                  summary: Неверный формат или длина токена
                  value:
                    error: "invalid token format, must be 10 characters alphanumeric or underscore"
        '404':
          description: Токен не найден в системе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                TokenNotFound:
                  summary: Токен отсутствует в базе данных
                  value:
                    error: "url not found"
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InternalError:
                  summary: Ошибка сервера
                  value:
                    error: "internal server error"

components:
  schemas:
    ShortenRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Оригинальный длинный URL, который нужно сократить
          example: "https://github.com/gin-gonic/gin"

    ShortenResponse:
      type: object
      properties:
        result:
          type: string
          minLength: 10
          maxLength: 10
          pattern: '^[a-zA-Z0-9_]{10}$'
          description: Сгенерированный уникальный 10-значный токен
          example: "X_9b2DfR4e"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Текстовое описание произошедшей ошибки
          example: "invalid request body"